<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pré-diagnostic</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">Assistant pré-diagnostic médical</p>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- FORMULAIRE -->
            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">

                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    Symptômes du patient
                </h2>

                <!-- Âge -->
                <div class="mb-3">
                    <label class="block text-sm font-medium">Âge</label>
                    <input type="number" id="age" class="w-full border p-2 rounded-lg" placeholder="Ex: 28">
                </div>

                <!-- Sexe -->
                <div class="mb-3">
                    <label class="block text-sm font-medium">Sexe</label>
                    <select id="sexe" class="w-full border p-2 rounded-lg">
                        <option value="F">Féminin</option>
                        <option value="M">Masculin</option>
                    </select>
                </div>

                <!-- Température -->
                <div class="mb-3">
                    <label class="block text-sm font-medium">Température</label>
                    <input type="number" id="temperature" step="0.1" class="w-full border p-2 rounded-lg"
                        placeholder="Ex: 38.5">
                </div>

                <!-- Tension -->
                <div class="mb-3">
                    <label class="block text-sm font-medium">Tension systolique</label>
                    <input type="number" id="tension_sys" class="w-full border p-2 rounded-lg"
                        placeholder="Ex: 120">
                </div>

                <!-- Symptômes -->
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-2">Symptômes</label>

                    <label class="flex items-center"><input type="checkbox" id="toux" class="mr-2"> Toux</label>
                    <label class="flex items-center"><input type="checkbox" id="fatigue" class="mr-2"> Fatigue</label>
                    <label class="flex items-center"><input type="checkbox" id="maux_tete" class="mr-2"> Maux de tête</label>
                </div>

                <!-- Région -->
                <div class="mb-4">
                    <label class="block text-sm font-medium">Région</label>
                    <select id="region" class="w-full border p-2 rounded-lg">
                        <option>Dakar</option>
                        <option>Thiès</option>
                        <option>Saint-Louis</option>
                        <option>Ziguinchor</option>
                        <option>Kaolack</option>
                    </select>
                </div>

                <!-- Bouton -->
                <button onclick="diagnostiquer()"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                    Diagnostiquer
                </button>

            </div>

            <!-- RESULTAT -->
            <div id="result-section">

                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                    <p class="text-4xl">🩺</p>
                    <p class="font-medium">Remplissez le formulaire</p>
                    <p class="text-sm">puis cliquez sur Diagnostiquer</p>
                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.3 - ESP / UCAD - L2 GLSI 2026
    </footer>

    <!-- JS -->
    <script>

        const API_URL = "http://localhost:8000";

        async function diagnostiquer() {

            const patient = {
                age: Number(document.getElementById("age").value),
                sexe: document.getElementById("sexe").value,
                temperature: Number(document.getElementById("temperature").value),
                tension_sys: Number(document.getElementById("tension_sys").value),

                toux: document.getElementById("toux").checked,
                fatigue: document.getElementById("fatigue").checked,
                maux_tete: document.getElementById("maux_tete").checked,

                region: document.getElementById("region").value
            };

            if (
                isNaN(patient.age) ||
                isNaN(patient.temperature) ||
                isNaN(patient.tension_sys)
            ) {
                afficherErreur("Veuillez remplir tous les champs correctement.");
                return;
            }

            afficherChargement();

            try {

                const response = await fetch(API_URL + "/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patient)
                });

                if (!response.ok) {
                    throw new Error("Erreur serveur");
                }

                const resultat = await response.json();
                afficherResultat(resultat);

            } catch (error) {
                afficherErreur("Erreur de connexion : " + error.message);
            }
        }

        function afficherChargement() {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-white p-6 text-center rounded-xl shadow-md">
                    <div class="animate-spin h-10 w-10 border-b-2 border-blue-600 mx-auto mb-3"></div>
                    Analyse en cours...
                </div>
            `;
        }

        function afficherResultat(r) {

            const couleurs = {
                palu: "red",
                grippe: "orange",
                typh: "yellow",
                sain: "green"
            };

            const color = couleurs[r.diagnostic] || "green";
            const pct = Math.round(r.probabilite * 100);

            document.getElementById("result-section").innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-md">

                    <h2 class="text-xl font-bold mb-3">Résultat</h2>

                    <div class="bg-${color}-100 p-3 rounded mb-3">
                        <p class="font-bold text-${color}-700 uppercase">
                            ${r.diagnostic}
                        </p>
                    </div>

                    <p class="mb-2">Probabilité: <b>${pct}%</b></p>

                    <div class="w-full bg-gray-200 h-3 rounded">
                        <div class="bg-${color}-500 h-3 rounded" style="width:${pct}%"></div>
                    </div>

                    <p class="mt-3 text-sm text-gray-600">${r.message}</p>

                </div>
            `;
        }

        function afficherErreur(msg) {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-red-100 text-red-700 p-4 rounded-xl">
                    ${msg}
                </div>
            `;
        }

    </script>

</body>
</html>
