<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pré-diagnostic</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<header class="bg-blue-600 text-white py-4 shadow-lg">
    <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-2xl font-bold">SenSante</h1>
        <p class="text-blue-100 text-sm">Assistant pré-diagnostic médical</p>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- FORM -->
<div class="bg-white rounded-xl shadow-md p-6">

    <h2 class="text-xl font-bold mb-4">Symptômes du patient</h2>

    <input id="age" type="number" placeholder="Âge"
        class="w-full border p-2 rounded mb-3">

    <select id="sexe" class="w-full border p-2 rounded mb-3">
        <option value="F">Féminin</option>
        <option value="M">Masculin</option>
    </select>

    <input id="temperature" type="number" step="0.1"
        placeholder="Température"
        class="w-full border p-2 rounded mb-3">

    <input id="tension_sys" type="number"
        placeholder="Tension"
        class="w-full border p-2 rounded mb-3">

    <label><input type="checkbox" id="toux"> Toux</label><br>
    <label><input type="checkbox" id="fatigue"> Fatigue</label><br>
    <label><input type="checkbox" id="maux_tete"> Maux de tête</label><br><br>

    <select id="region" class="w-full border p-2 rounded mb-4">
        <option>Dakar</option>
        <option>Thiès</option>
        <option>Saint-Louis</option>
        <option>Ziguinchor</option>
        <option>Kaolack</option>
    </select>

    <button onclick="diagnostiquer()"
        class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Diagnostiquer
    </button>

</div>

<!-- RESULT -->
<div id="result-section">
    <div class="bg-white p-6 rounded-xl text-gray-400 text-center shadow">
        🩺 Remplissez le formulaire
    </div>
</div>

</div>

<!-- HISTORIQUE -->
<div class="mt-8 bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-bold mb-4">Historique</h2>
    <div id="historique-container">
        <p class="text-gray-400">Aucune consultation</p>
    </div>
</div>

</main>

<footer class="text-center text-gray-400 text-sm py-4">
    SenSante v0.3 - ESP / UCAD - L2 GLSI 2026
</footer>

<script>

const API_URL = "http://localhost:8000";

/* ------------------ DIAGNOSTICS ------------------ */

const icones = {
    palu: "🦟",
    grippe: "🤧",
    typh: "🌡️",
    sain: "✅"
};

const styles = {
    palu: { bg: "bg-red-100", text: "text-red-600" },
    grippe: { bg: "bg-orange-100", text: "text-orange-600" },
    typh: { bg: "bg-yellow-100", text: "text-yellow-600" },
    sain: { bg: "bg-green-100", text: "text-green-600" }
};

const barColors = {
    palu: "bg-red-500",
    grippe: "bg-orange-500",
    typh: "bg-yellow-500",
    sain: "bg-green-500"
};

/* ------------------ API CALL ------------------ */

async function diagnostiquer() {

    const patient = {
        age: Number(document.getElementById("age").value),
        sexe: document.getElementById("sexe").value,
        temperature: Number(document.getElementById("temperature").value),
        tension_sys: Number(document.getElementById("tension_sys").value),
        toux: document.getElementById("toux").checked,
        fatigue: document.getElementById("fatigue").checked,
        maux_tete: document.getElementById("maux_tete").checked,
        region: document.getElementById("region").value
    };

    if (isNaN(patient.age) || isNaN(patient.temperature) || isNaN(patient.tension_sys)) {
        afficherErreur("Champs invalides");
        return;
    }

    afficherChargement();

    try {

        const res = await fetch(API_URL + "/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patient)
        });

        if (!res.ok) throw new Error("Erreur serveur");

        const data = await res.json();

        afficherResultat(data);
        ajouterHistorique(patient, data);

    } catch (err) {
        afficherErreur(err.message);
    }
}

/* ------------------ RESULTAT ------------------ */

function afficherChargement() {
    document.getElementById("result-section").innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow text-center">
            ⏳ Analyse...
        </div>
    `;
}

function afficherResultat(r) {

    const style = styles[r.diagnostic] || styles.sain;
    const bar = barColors[r.diagnostic] || "bg-green-500";
    const pct = Math.round(r.probabilite * 100);
    const icon = icones[r.diagnostic] || "🔍";

    document.getElementById("result-section").innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow">

            <h2 class="text-xl font-bold mb-3">Résultat</h2>

            <div class="${style.bg} p-4 rounded flex gap-3 items-center">
                <span class="text-4xl">${icon}</span>
                <div>
                    <p class="text-sm text-gray-600">Diagnostic</p>
                    <p class="text-xl font-bold ${style.text}">
                        ${r.diagnostic}
                    </p>
                </div>
            </div>

            <p class="mt-3">Probabilité: <b>${pct}%</b></p>

            <div class="w-full bg-gray-200 h-3 rounded mt-2">
                <div class="${bar} h-3 rounded" style="width:${pct}%"></div>
            </div>

            <p class="mt-3 text-sm text-gray-500">${r.message}</p>

        </div>
    `;

    demanderExplication(r);
}

/* ------------------ EXPLICATION ------------------ */

async function demanderExplication(data) {

    const payload = {
        diagnostic: data.diagnostic,
        probabilite: data.probabilite
    };

    try {

        const res = await fetch(API_URL + "/explain", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        document.querySelector("#result-section .bg-white").innerHTML += `
            <div class="mt-4 p-3 bg-purple-50 rounded border">
                <p class="text-purple-600 font-semibold text-sm mb-2">
                    Explication
                </p>
                <p class="text-sm text-gray-700">
                    ${result.explication}
                </p>
            </div>
        `;

    } catch (e) {
        console.log("explication error");
    }
}

/* ------------------ ERREUR ------------------ */

function afficherErreur(msg) {
    document.getElementById("result-section").innerHTML = `
        <div class="bg-red-100 text-red-700 p-4 rounded-xl">
            ${msg}
        </div>
    `;
}

/* ------------------ HISTORIQUE ------------------ */

let historique = [];

function ajouterHistorique(patient, r) {

    historique.unshift({
        heure: new Date().toLocaleTimeString(),
        age: patient.age,
        sexe: patient.sexe,
        region: patient.region,
        diagnostic: r.diagnostic,
        probabilite: Math.round(r.probabilite * 100)
    });

    if (historique.length > 5) historique.pop();

    afficherHistorique();
}

function afficherHistorique() {

    const c = document.getElementById("historique-container");

    if (historique.length === 0) {
        c.innerHTML = `<p class="text-gray-400">Aucun diagnostic</p>`;
        return;
    }

    c.innerHTML = `
        <table class="w-full text-sm">
            <tr class="text-gray-400">
                <th>Heure</th>
                <th>Patient</th>
                <th>Région</th>
                <th>Diag</th>
                <th>Proba</th>
            </tr>

            ${historique.map(h => `
                <tr class="border-t">
                    <td>${h.heure}</td>
                    <td>${h.age} ${h.sexe}</td>
                    <td>${h.region}</td>
                    <td>${h.diagnostic}</td>
                    <td>${h.probabilite}%</td>
                </tr>
            `).join("")}
        </table>
    `;
}

</script>

</body>
</html>
